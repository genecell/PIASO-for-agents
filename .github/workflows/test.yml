name: test
# Phase 3 — execute every canonical code block (Python + R) against PIASO-data fixtures.
# A release in any component repo (see dispatch below) re-runs this suite, plus a nightly
# fallback, so the docs cannot silently rot against a new component version.
on:
  push: { branches: [master] }
  pull_request:
  schedule:
    - cron: "0 5 * * *"          # nightly fallback
  repository_dispatch:
    types: [component-release]    # fired by PIASO/COSG/COSGR/LARIS/Emergene on release
  workflow_dispatch:

jobs:
  python-blocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install ecosystem (pinned matplotlib<3.9 — see gotchas.md)
        run: |
          pip install piaso-tools cosg laris emergene "matplotlib<3.9" \
                      igraph leidenalg pytest pyyaml
      - name: Compile-check all python blocks (offline)
        run: PIASO_SKIP_FUNCTIONAL=1 pytest tests/test_py_blocks.py -q -k compile
      - name: Functional (fixtures from PIASO-data + live PIASOmarkerDB API)
        run: pytest tests/test_py_blocks.py -q
      - name: Plotting/preprocessing helpers (headless Agg backend)
        run: pytest tests/test_plots.py -q

  clean-env-selfsufficiency:
    # Prove each components/*.md is self-sufficient: run its block with ONLY that
    # component installed (no piaso-tools). Catches hidden PIASO/INFOG dependencies.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [cosg, laris, emergene]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install ONLY ${{ matrix.component }} (no piaso-tools)
        run: pip install ${{ matrix.component }} igraph leidenalg "matplotlib<3.9"
      - name: Fetch the smallest PIASO-data fixture
        run: |
          curl -L "https://zenodo.org/api/records/19699639/files/SC3_v3_NextGem_DI_Nuclei_5K_SC3_v3_NextGem_DI_Nuclei_5K_count_sample_feature_bc_matrix.h5/content" \
            -o fixture.h5
      - name: Run ${{ matrix.component }} block with no piaso present
        run: python tests/clean_env/run_${{ matrix.component }}.py fixture.h5

  r-blocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with: { r-version: "4.3" }
      - name: Install SeuratObject + COSGR
        run: |
          Rscript -e 'install.packages(c("SeuratObject","proxyC","data.table","remotes"), repos="https://cloud.r-project.org")'
          Rscript -e 'remotes::install_github("genecell/COSGR")'
      - name: Run R block parse checks + functional COSGR
        run: Rscript tests/test_r_blocks.R
